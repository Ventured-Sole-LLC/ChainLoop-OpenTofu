name: Checkov Policy Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checkov:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov (audit mode)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: environments/dev
          framework: terraform
          soft_fail: true
          output_format: cli
